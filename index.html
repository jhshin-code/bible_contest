<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성경 암송 대회</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: #f0f4ff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 28px 16px 100px;
}

/* ── 헤더 ── */
header { text-align: center; margin-bottom: 28px; }
header .emoji { font-size: 2.8rem; display: block; margin-bottom: 6px; }
header h1 { font-size: 1.9rem; font-weight: 900; color: #1e3a8a; letter-spacing: -0.5px; }
header p { margin-top: 5px; font-size: 0.9rem; color: #6b7280; font-weight: 700; }

/* ── 공통 카드 ── */
.card {
  width: 100%; max-width: 560px;
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}

/* ── 슬롯 + 말씀 카드 ── */
.slot-card { padding: 24px 24px 28px; margin-bottom: 16px; }
.slot-label { font-size: 0.78rem; font-weight: 900; color: #6366f1; letter-spacing: 1.5px; margin-bottom: 12px; }
.slot-window {
  background: #eef2ff; border-radius: 14px;
  height: 64px; display: flex; align-items: center; justify-content: center;
  overflow: hidden; margin-bottom: 20px;
}
.slot-text { font-size: 1.2rem; font-weight: 900; color: #4338ca; text-align: center; padding: 0 12px; }

/* ── 말씀 카드 ── */
.verse-card {
  cursor: pointer; padding: 26px 24px 22px;
  border: 2.5px solid #e0e7ff; border-radius: 16px;
  transition: box-shadow 0.2s, border-color 0.2s;
  user-select: none; background: #fafbff;
}
.verse-card:hover { border-color: #a5b4fc; box-shadow: 0 4px 20px rgba(99,102,241,0.12); }

.verse-card-empty {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 110px; gap: 8px;
}
.verse-card-empty .empty-icon { font-size: 2rem; }
.verse-card-empty p { font-size: 0.9rem; color: #9ca3af; font-weight: 700; }

.verse-ref {
  display: inline-block; font-size: 0.8rem; font-weight: 900; color: #dc2626;
  background: #fef2f2; border: 1.5px solid #fca5a5; border-radius: 8px;
  padding: 3px 12px; margin-bottom: 14px; letter-spacing: 0.5px;
}
.verse-hint-word { font-size: 2.1rem; font-weight: 900; color: #1e3a8a; margin-bottom: 8px; letter-spacing: -1px; }

/* 개인 2단계: 장절만 */
.verse-only-ref { font-size: 1.8rem; font-weight: 900; color: #1e3a8a; margin-bottom: 8px; }

.tap-hint { font-size: 0.82rem; color: #818cf8; font-weight: 700; display: flex; align-items: center; gap: 6px; }
.tap-dot { width: 7px; height: 7px; border-radius: 50%; background: #818cf8; animation: blink 1.4s ease-in-out infinite; flex-shrink: 0; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

.divider { height: 1.5px; background: linear-gradient(90deg, transparent, #c7d2fe, transparent); margin: 18px 0; }

.verse-full-text { font-size: 1.12rem; font-weight: 700; color: #111827; line-height: 2; animation: slideDown 0.3s ease; }
@keyframes slideDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

/* ── 상단 선택/목록 버튼 ── */
.top-btn-row {
  display: flex; gap: 12px; width: 100%; max-width: 560px;
  justify-content: center; margin-bottom: 16px;
}
.btn {
  font-family: 'Noto Sans KR', sans-serif; font-size: 1rem; font-weight: 900;
  border: none; border-radius: 14px; padding: 15px 0; cursor: pointer;
  transition: transform 0.1s; flex: 1;
}
.btn:active { transform: scale(0.95); }
.btn-select { background: linear-gradient(135deg, #6366f1, #4338ca); color: #fff; box-shadow: 0 4px 16px rgba(99,102,241,0.35); }
.btn-list   { background: #fff; color: #4338ca; border: 2px solid #c7d2fe; }

/* ── 하단 모드 탭 (고정) ── */
.mode-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #fff;
  border-top: 1.5px solid #e0e7ff;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
  display: flex;
  z-index: 50;
  padding: 8px 12px 12px;
  gap: 8px;
  justify-content: center;
}
.mode-tab {
  flex: 1; max-width: 130px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 0.78rem; font-weight: 900;
  border: 2px solid #e0e7ff;
  border-radius: 12px;
  padding: 10px 6px;
  cursor: pointer;
  background: #f8faff;
  color: #6b7280;
  text-align: center;
  transition: all 0.18s;
  line-height: 1.4;
}
.mode-tab .tab-icon { font-size: 1.1rem; display: block; margin-bottom: 2px; }
.mode-tab.active {
  background: linear-gradient(135deg, #6366f1, #4338ca);
  color: #fff; border-color: transparent;
  box-shadow: 0 3px 12px rgba(99,102,241,0.35);
}

/* ── 목록 모달 ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(15,23,42,0.5); z-index: 100;
  align-items: flex-end; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: #fff; border-radius: 24px 24px 0 0;
  width: 100%; max-width: 600px; max-height: 80vh;
  overflow-y: auto; padding: 20px 20px 40px;
}
.modal-handle { width: 40px; height: 4px; background: #e5e7eb; border-radius: 99px; margin: 0 auto 20px; }
.modal-box h2 { font-size: 1.1rem; font-weight: 900; color: #1e3a8a; text-align: center; margin-bottom: 16px; }
.list-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 14px; border-radius: 12px; margin-bottom: 8px;
  background: #f8fafc; border: 1.5px solid #e2e8f0;
}
.list-num {
  width: 28px; height: 28px; border-radius: 8px; background: #6366f1;
  color: #fff; font-size: 0.76rem; font-weight: 900;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.list-ref { font-size: 0.8rem; font-weight: 900; color: #dc2626; margin-bottom: 3px; }
.list-full { font-size: 0.88rem; font-weight: 700; color: #374151; line-height: 1.6; }
.modal-close {
  display: block; margin: 20px auto 0;
  font-family: 'Noto Sans KR', sans-serif; font-size: 0.95rem; font-weight: 900;
  background: #f1f5f9; color: #64748b; border: none;
  border-radius: 12px; padding: 12px 40px; cursor: pointer;
}

/* ── 색종이 ── */
.confetti-layer { position: fixed; inset: 0; pointer-events: none; z-index: 200; display: none; }
.confetti-piece { position: absolute; animation: fall 1.6s ease-in forwards; }
@keyframes fall { from{transform:translateY(-20px) rotate(0deg);opacity:1} to{transform:translateY(100vh) rotate(600deg);opacity:0} }
</style>
</head>
<body>

<header>
  <span class="emoji">📖</span>
  <h1>성경 암송 대회</h1>
</header>

<!-- 슬롯 + 말씀 카드 -->
<div class="card slot-card">
  <div class="slot-label" id="modeLabel">🏆 단체전 1단계</div>
  <div class="slot-window">
    <div class="slot-text" id="slotText">아래에서 단계를 선택하세요!</div>
  </div>
  <div class="verse-card" id="verseCard" onclick="toggleReveal()">
    <div id="emptyState" class="verse-card-empty">
      <div class="empty-icon">🕊️</div>
      <p>구절이 여기에 표시돼요</p>
    </div>
    <div id="verseContent" style="display:none;">
      <div class="verse-ref" id="verseRef"></div>
      <div id="verseHintWrap"></div>
      <div class="tap-hint">
        <span class="tap-dot"></span>
        <span id="tapHintText">눌러서 전체 말씀 보기</span>
      </div>
      <div class="divider" id="verseDivider" style="display:none;"></div>
      <div class="verse-full-text" id="verseFull" style="display:none;"></div>
    </div>
  </div>
</div>

<!-- 선택 / 목록 버튼 -->
<div class="top-btn-row">
  <button class="btn btn-select" onclick="spinVerse()">🎲 선택!</button>
  <button class="btn btn-list"   onclick="showList()">📋 전체 목록</button>
</div>

<!-- 하단 모드 탭 -->
<div class="mode-bar">
  <button class="mode-tab active" onclick="setMode(0)"><span class="tab-icon">🏆</span>분반 주암송</button>
  <button class="mode-tab"        onclick="setMode(1)"><span class="tab-icon">🥇</span>분반 월암송</button>
  <button class="mode-tab"        onclick="setMode(2)"><span class="tab-icon">🌟</span>개인 1단계</button>
  <button class="mode-tab"        onclick="setMode(3)"><span class="tab-icon">👑</span>개인 2단계</button>
</div>

<!-- 목록 모달 -->
<div class="modal-overlay" id="listModal">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <h2 id="modalTitle">📋 암송 구절 전체 목록</h2>
    <div id="listContent"></div>
    <button class="modal-close" onclick="hideList()">닫기</button>
  </div>
</div>

<!-- 색종이 -->
<div class="confetti-layer" id="confettiLayer"></div>

<script>
/* ───────────── 말씀 데이터 ───────────── */

// 단체전 1단계 (22절)
const group1 = [
  { ref:"엡 4:23~24",  hint:"오직",       full:"오직 심령으로 새롭게 되어 하나님을 따라 의와 진리의 거룩함으로 지으심을 받은 새 사람을 입으라" },
  { ref:"히 13:5",     hint:"내가",       full:"내가 과연 너희를 버리지 아니하고 과연 너희를 떠나지 아니하리라 하셨느니라" },
  { ref:"렘 10:10",    hint:"오직",       full:"오직 여호와는 참 하나님이시요 사시는 하나님이시요 영원한 왕이시라" },
  { ref:"시 105:4",    hint:"여호와와",   full:"여호와와 그 능력을 구할지어다 그 얼굴을 항상 구할지어다" },
  { ref:"마 10:41",    hint:"선지자의",   full:"선지자의 이름으로 선지자를 영접하는 자는 선지자의 상을 받을 것이요" },
  { ref:"롬 10:11",    hint:"성경에",     full:"성경에 이르되 누구든지 저를 믿는 자는 부끄러움을 당하지 아니하리라 하니" },
  { ref:"눅 12:15",    hint:"삼가",       full:"삼가 모든 탐심을 물리치라 사람의 생명이 그 소유의 넉넉한 데 있지 아니하니라" },
  { ref:"요일 5:18",   hint:"하나님께로서", full:"하나님께로서 나신 자가 저를 지키시매 악한 자가 저를 만지지도 못하느니라" },
  { ref:"롬 10:15",    hint:"아름답도다", full:"아름답도다 좋은 소식을 전하는 자들의 발이여" },
  { ref:"딤후 4:2",    hint:"너는",       full:"너는 말씀을 전파하라 때를 얻든지 못 얻든지 항상 힘쓰라" },
  { ref:"요일 1:9",    hint:"만일",       full:"만일 우리가 우리 죄를 자백하면 저는 미쁘시고 의로우사 우리 죄를 사하시며" },
  { ref:"왕하 18:3",   hint:"히스기야가", full:"히스기야가 그 조상 다윗의 모든 행위와 같이 여호와 보시기에 정직히 행하여" },
  { ref:"요 5:39",     hint:"이",         full:"이 성경이 곧 내게 대하여 증거하는 것이로다" },
  { ref:"시 119:11",   hint:"내가",       full:"내가 주께 범죄치 아니하려 하여 주의 말씀을 내 마음에 두었나이다" },
  { ref:"렘 1:7",      hint:"내가",       full:"내가 너를 누구에게 보내든지 너는 가며 내가 네게 무엇을 명하든지 너는 말할지니라" },
  { ref:"벧후 3:9",    hint:"오직",       full:"오직 너희를 대하여 오래 참으사 아무도 멸망치 않고 다 회개하기에 이르기를 원하시느니라" },
  { ref:"시 57:7",     hint:"하나님이여", full:"하나님이여 내 마음이 확정되었고 내 마음이 확정 되었사오니" },
  { ref:"단 3:18",     hint:"그리",       full:"그리 아니하실지라도 왕이여 우리가 왕의 신들을 섬기지도 아니하고 왕의 세우신 금 신상에게 절하지도 아니할 줄을 아옵소서" },
  { ref:"삼상 2:3",    hint:"여호와는",   full:"여호와는 지식의 하나님이시라 행동을 달아보시느니라" },
  { ref:"살후 3:3",    hint:"주는",       full:"주는 미쁘사 너희를 굳게 하시고 악한 자에게서 지키시리라" },
  { ref:"시 126:3",    hint:"여호와께서", full:"여호와께서 우리를 위하여 대사를 행하셨으니 우리는 기쁘도다" },
  { ref:"시 19:10",    hint:"금",         full:"금 곧 많은 정금보다 더 사모할 것이며 꿀과 송이 꿀보다 더 달도다" },
];

// 단체전 2단계 (5절 — 장문)
const group2 = [
  { ref:"딤후 3:15-17", hint:"또",
    full:"또 네가 어려서부터 성경을 알았나니 성경은 능히 너로 하여금 그리스도 예수 안에 있는 믿음으로 말미암아 구원에 이르는 지혜가 있게 하느니라 모든 성경은 하나님의 감동으로 된 것으로 교훈과 책망과 바르게 함과 의로 교육하기에 유익하니 이는 하나님의 사람으로 온전케 하며 모든 선한 일을 행하기에 온전케 하려 함이니라" },
  { ref:"골 1:15-17", hint:"그는",
    full:"그는 보이지 아니하시는 하나님의 형상이요 모든 창조물보다 먼저 나신 자니 만물이 그에게 창조되되 하늘과 땅에서 보이는 것들과 보이지 않는 것들과 혹은 보좌들이나 주관들이나 정사들이나 권세들이나 만물이 다 그로 말미암고 그를 위하여 창조되었고 또한 그가 만물보다 먼저 계시고 만물이 그 안에 함께 섰느니라" },
  { ref:"롬 8:26-28", hint:"이와",
    full:"이와 같이 성령도 우리 연약함을 도우시나니 우리가 마땅히 빌 바를 알지 못하나 오직 성령이 말할 수 없는 탄식으로 우리를 위하여 친히 간구하시느니라 마음을 감찰하시는 이가 성령의 생각을 아시나니 이는 성령이 하나님의 뜻대로 성도를 위하여 간구하심이니라 우리가 알거니와 하나님을 사랑하는 자 곧 그 뜻대로 부르심을 입은 자들에게는 모든 것이 합력하여 선을 이루느니라" },
  { ref:"골 1:12-14", hint:"우리로",
    full:"우리로 하여금 빛 가운데서 성도의 기업의 부분을 얻기에 합당하게 하신 아버지께 감사하게 하시기를 원하노라 그가 우리를 흑암의 권세에서 건져내사 그의 사랑의 아들의 나라로 옮기셨으니 그 아들 안에서 우리가 구속 곧 죄 사함을 얻었도다" },
  { ref:"골 1:27-28", hint:"하나님이",
    full:"하나님이 그들로 하여금 이 비밀의 영광이 이방인 가운데 어떻게 풍성한 것을 알게 하려 하심이라 이 비밀은 너희 안에 계신 그리스도시니 곧 영광의 소망이니라 우리가 그를 전파하여 각 사람을 권하고 모든 지혜로 각 사람을 가르침은 각 사람을 그리스도 안에서 완전한 자로 세우려 함이니" },
];

// 개인전 추가 9절 (개역한글)
const personal_extra = [
  { ref:"레 17:11",    hint:"육체의",
    full:"육체의 생명은 피에 있음이라 내가 이 피를 너희에게 주어 단에 뿌려 너희의 생명을 위하여 속하게 하였나니 생명이 피에 있으므로 피가 죄를 속하느니라" },
  { ref:"사 43:25",    hint:"나 곧",
    full:"나 곧 나는 나를 위하여 네 허물을 도말하는 자니 네 죄를 기억지 아니하리라" },
  { ref:"사 44:22",    hint:"내가",
    full:"내가 네 허물을 빽빽한 구름의 사라짐 같이, 네 죄를 안개의 사라짐 같이 도말하였으니 너는 내게로 돌아오라 내가 너를 구속하였음이니라" },
  { ref:"사 53:6",     hint:"우리는",
    full:"우리는 다 양 같아서 그릇 행하여 각기 제 길로 갔거늘 여호와께서는 우리 무리의 죄악을 그에게 담당시키셨도다" },
  { ref:"미 7:19",     hint:"다시",
    full:"다시 우리를 긍휼히 여기셔서 우리의 죄악을 발로 밟으시고 우리의 모든 죄를 깊은 바다에 던지시리이다" },
  { ref:"골 1:14",     hint:"그 아들",
    full:"그 아들 안에서 우리가 구속 곧 죄 사함을 얻었도다" },
  { ref:"히 9:12",     hint:"염소와",
    full:"염소와 송아지의 피로 아니하고 오직 자기 피로 영원한 속죄를 이루사 단번에 성소에 들어가셨느니라" },
  { ref:"히 9:26",     hint:"그리하면",
    full:"그리하면 그가 세상을 창조할 때부터 자주 고난을 받았어야 할 것이로되 이제 자기를 단번에 제사로 드려 죄를 없이 하시려고 세상 끝에 나타나셨느니라" },
  { ref:"히 10:17",    hint:"또",
    full:"또 저희 죄와 저희 불법을 내가 다시 기억지 아니하리라 하셨으니" },
];

// 개인전 1단계 = group1 + personal_extra
const personal1 = [...group1, ...personal_extra];

/* ───────────── 모드 설정 ───────────── */
// mode: 0=단체1, 1=단체2, 2=개인1, 3=개인2
const modeConfig = [
  { label:"🏆 단체전 1단계", verses: group1,   showHint: true  },
  { label:"🥇 단체전 2단계", verses: group2,   showHint: true  },
  { label:"🌟 개인전 1단계", verses: personal1, showHint: true  },
  { label:"👑 개인전 2단계", verses: personal1, showHint: false },
];

let currentMode  = 0;
let currentIndex = -1;
let revealed     = false;
let spinning     = false;

function setMode(m) {
  currentMode  = m;
  currentIndex = -1;
  revealed     = false;

  // 탭 스타일
  document.querySelectorAll('.mode-tab').forEach((el, i) => el.classList.toggle('active', i === m));

  // 레이블
  document.getElementById('modeLabel').textContent = modeConfig[m].label;

  // 슬롯 초기화
  document.getElementById('slotText').textContent = '선택 버튼을 눌러보세요!';

  // 카드 초기화
  document.getElementById('emptyState').style.display   = 'flex';
  document.getElementById('verseContent').style.display = 'none';
}

/* ───────────── 슬롯 & 말씀 ───────────── */
function spinVerse() {
  if (spinning) return;
  spinning = true;
  revealed = false;

  document.getElementById('emptyState').style.display   = 'none';
  document.getElementById('verseContent').style.display = 'none';
  document.getElementById('verseFull').style.display    = 'none';
  document.getElementById('verseDivider').style.display = 'none';
  document.getElementById('tapHintText').textContent    = '눌러서 전체 말씀 보기';

  const cfg      = modeConfig[currentMode];
  const verses   = cfg.verses;
  const slotEl   = document.getElementById('slotText');

  // 직전에 나온 구절만 제외하고 랜덤 선택
  let targetIdx;
  do {
    targetIdx = Math.floor(Math.random() * verses.length);
  } while (targetIdx === currentIndex && verses.length > 1);


  const totalFrames = 28;
  let frame = 0;

  function animate() {
    const v = verses[Math.floor(Math.random() * verses.length)];
    slotEl.textContent = cfg.showHint ? `${v.ref}  ·  ${v.hint}` : v.ref;
    frame++;
    if (frame < totalFrames) {
      setTimeout(animate, frame < 14 ? 55 : frame < 22 ? 95 : 155);
    } else {
      currentIndex = targetIdx;
      const tv = verses[targetIdx];
      slotEl.textContent = cfg.showHint ? `🎯  ${tv.ref}  ·  ${tv.hint}` : `🎯  ${tv.ref}`;
      showVerse();
      spinning = false;
      launchConfetti();
    }
  }
  animate();
}

function showVerse() {
  const cfg = modeConfig[currentMode];
  const v   = cfg.verses[currentIndex];

  document.getElementById('verseRef').textContent = v.ref;
  document.getElementById('verseFull').textContent = v.full;

  const hintWrap = document.getElementById('verseHintWrap');
  if (cfg.showHint) {
    hintWrap.innerHTML = `<div class="verse-hint-word">${v.hint}</div>`;
  } else {
    hintWrap.innerHTML = `<div class="verse-only-ref">📖 </div>`;
  }

  document.getElementById('verseContent').style.display = 'block';
  document.getElementById('emptyState').style.display   = 'none';
}

function toggleReveal() {
  if (currentIndex < 0) return;
  revealed = !revealed;
  document.getElementById('verseFull').style.display    = revealed ? 'block' : 'none';
  document.getElementById('verseDivider').style.display = revealed ? 'block' : 'none';
  document.getElementById('tapHintText').textContent    = revealed ? '다시 누르면 숨겨져요' : '눌러서 전체 말씀 보기';
}

/* ───────────── 색종이 ───────────── */
function launchConfetti() {
  const layer = document.getElementById('confettiLayer');
  layer.style.display = 'block';
  layer.innerHTML = '';
  const colors = ['#6366f1','#f59e0b','#10b981','#ef4444','#ec4899','#3b82f6'];
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    const size = (8 + Math.random() * 8) + 'px';
    p.style.cssText = `left:${Math.random()*100}%;top:-16px;width:${size};height:${size};background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*0.9}s;animation-duration:${1.3+Math.random()*0.8}s;border-radius:${Math.random()>.5?'50%':'3px'};`;
    layer.appendChild(p);
  }
  setTimeout(() => { layer.style.display = 'none'; }, 2800);
}

/* ───────────── 목록 모달 ───────────── */
function showList() {
  const cfg    = modeConfig[currentMode];
  const verses = cfg.verses;
  document.getElementById('modalTitle').textContent = `📋 ${cfg.label} — 전체 목록`;
  document.getElementById('listContent').innerHTML = verses.map((v, i) => `
    <div class="list-item">
      <div class="list-num">${i+1}</div>
      <div>
        <div class="list-ref">${v.ref}</div>
        <div class="list-full">${v.full}</div>
      </div>
    </div>`).join('');
  document.getElementById('listModal').classList.add('show');
}
function hideList() { document.getElementById('listModal').classList.remove('show'); }
document.getElementById('listModal').addEventListener('click', function(e) { if (e.target===this) hideList(); });
</script>
</body>
</html>
